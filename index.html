<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Auction Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0d;--surface:#0f1318;--card:#161b23;--border:#222830;--orange:#f97316;--green:#22c55e;--red:#ef4444;--blue:#60a5fa;--gold:#fbbf24;--purple:#a78bfa;--pink:#f472b6;--cyan:#22d3ee;--muted:#5a6575;--text:#e2e8f0;--text-dim:#8896a8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--orange);}
.header-right{display:flex;align-items:center;gap:10px;}
.status-badge{font-size:11px;padding:4px 10px;border-radius:5px;font-weight:600;letter-spacing:.5px;}
.status-badge.live{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:var(--red);}
.status-badge.idle{background:rgba(90,101,117,.15);border:1px solid var(--border);color:var(--muted);}
.status-badge.loading{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.35);color:var(--orange);}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:5px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.refresh-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;}
.refresh-btn:hover{border-color:var(--orange);color:var(--orange);}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed;}
.auto-label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.auto-toggle{width:32px;height:17px;border-radius:9px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;border:none;outline:none;}
.auto-toggle.on{background:var(--orange);}
.auto-toggle::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;}
.auto-toggle.on::after{left:17px;}
.tabs{display:flex;gap:4px;padding:9px 20px;border-bottom:1px solid var(--border);}
.tab{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--card);color:var(--text);border:1px solid var(--border);}
.page{display:none;padding:16px 20px;}
.page.active{display:block;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
.last-updated{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:14px;}

/* STANDINGS */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:20px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden;transition:border-color .2s;}
.scard.rank1{border-color:rgba(251,191,36,.4);box-shadow:0 0 20px rgba(251,191,36,.06);}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.scard.Porter::before{background:var(--orange);}.scard.Chris::before{background:var(--blue);}
.scard.Mush::before{background:var(--green);}.scard.Jandy::before{background:var(--purple);}
.scard.Slade::before{background:var(--pink);}.scard.Corr::before{background:var(--cyan);}
.scard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.scard-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.scard.Porter .scard-name{color:var(--orange);}.scard.Chris .scard-name{color:var(--blue);}
.scard.Mush .scard-name{color:var(--green);}.scard.Jandy .scard-name{color:var(--purple);}
.scard.Slade .scard-name{color:var(--pink);}.scard.Corr .scard-name{color:var(--cyan);}
.scard-score{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;}
.scard.rank1 .scard-score{color:var(--gold);}
.scard-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:10px;}
.scard-meta span{font-family:'DM Mono',monospace;}
.scard-meta .alive{color:var(--green);}
.scard-meta .dead{color:var(--red);}
.bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.Porter .bar-fill{background:var(--orange);}.Chris .bar-fill{background:var(--blue);}
.Mush .bar-fill{background:var(--green);}.Jandy .bar-fill{background:var(--purple);}
.Slade .bar-fill{background:var(--pink);}.Corr .bar-fill{background:var(--cyan);}
.rank-crown{font-size:14px;margin-left:4px;}

/* GAME LOG */
.game-log{display:flex;flex-direction:column;gap:7px;}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.gcard.live-game{border-color:rgba(239,68,68,.4);animation:borderPulse 2s infinite;}
@keyframes borderPulse{0%,100%{border-color:rgba(239,68,68,.4);}50%{border-color:rgba(239,68,68,.8);}}
.grnd{font-size:10px;font-family:'DM Mono',monospace;background:var(--surface);border-radius:3px;padding:2px 6px;color:var(--text-dim);white-space:nowrap;min-width:36px;text-align:center;}
.grnd.live{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.gteams{flex:1;min-width:180px;}
.gwinner{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.gloser{font-size:11px;color:var(--text-dim);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.gscore{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text-dim);white-space:nowrap;}
.gpts{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.chip{font-size:10px;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;white-space:nowrap;}
.chip.r{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2);}
.chip.m{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.chip.u{background:rgba(251,191,36,.1);color:var(--gold);border:1px solid rgba(251,191,36,.2);}
.chip.tot{font-weight:700;background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.2);}
.chip.live-chip{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.owner{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;}
.Porter.owner{background:rgba(249,115,22,.12);color:var(--orange);}
.Chris.owner{background:rgba(96,165,250,.12);color:var(--blue);}
.Mush.owner{background:rgba(34,197,94,.12);color:var(--green);}
.Jandy.owner{background:rgba(167,139,250,.12);color:var(--purple);}
.Slade.owner{background:rgba(244,114,182,.12);color:var(--pink);}
.Corr.owner{background:rgba(34,211,238,.12);color:var(--cyan);}
.none-own{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--surface);color:var(--muted);}
.s1{color:var(--gold);}.s2{color:#c0c0c0;}.s3{color:#cd7f32;}.s4,.s5{color:var(--blue);}.s6,.s7,.s8{color:var(--text-dim);}.s9,.s10,.s11{color:var(--green);}.s12,.s13,.s14,.s15,.s16{color:var(--red);}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:14px 0 7px;font-weight:700;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px;}

/* ROSTERS TABLE */
.roster-block{margin-bottom:22px;}
.roster-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;}
.roster-header.Porter{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.3);}
.roster-header.Chris{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);}
.roster-header.Mush{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);}
.roster-header.Jandy{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.3);}
.roster-header.Slade{background:rgba(244,114,182,.08);border-color:rgba(244,114,182,.3);}
.roster-header.Corr{background:rgba(34,211,238,.08);border-color:rgba(34,211,238,.3);}
.roster-hname{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.roster-header.Porter .roster-hname{color:var(--orange);}
.roster-header.Chris .roster-hname{color:var(--blue);}
.roster-header.Mush .roster-hname{color:var(--green);}
.roster-header.Jandy .roster-hname{color:var(--purple);}
.roster-header.Slade .roster-hname{color:var(--pink);}
.roster-header.Corr .roster-hname{color:var(--cyan);}
.roster-htotals{display:flex;gap:16px;align-items:center;}
.roster-hstat{text-align:right;}
.roster-hstat .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.roster-hstat .val{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.roster-hstat .val.gold{color:var(--gold);}
.roster-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:0 0 8px 8px;overflow:hidden;}
.roster-table th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:7px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface);}
.roster-table th.right{text-align:right;}
.roster-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.roster-table tr:last-child td{border-bottom:none;}
.roster-table tr.eliminated td{opacity:.45;}
.roster-table tr.eliminated .team-name-cell{text-decoration:line-through;text-decoration-color:var(--red);}
.roster-table tr:hover td{background:rgba(255,255,255,.02);}
.team-name-cell{font-weight:600;}
.pts-cell{text-align:right;font-family:'DM Mono',monospace;font-weight:600;font-size:14px;}
.pts-cell.has-pts{color:var(--gold);}
.pts-cell.no-pts{color:var(--muted);}
.cost-cell{text-align:right;font-family:'DM Mono',monospace;color:var(--text-dim);font-size:12px;}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
.status-dot.alive{background:var(--green);}
.status-dot.elim{background:var(--red);}
.ptschips{display:flex;gap:3px;justify-content:flex-end;flex-wrap:wrap;}
.roster-table tfoot td{background:var(--surface);font-weight:700;font-size:13px;border-top:2px solid var(--border);}
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
</style>
</head>
<body>
<header>
  <div class="logo">🏀 MM Auction Live</div>
  <div class="header-right">
    <div class="auto-label">
      Auto-refresh
      <button class="auto-toggle" id="autoToggle" onclick="toggleAuto()" title="Toggle auto-refresh"></button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshScores()">
      <span id="refreshIcon">↻</span> Refresh
    </button>
    <div class="status-badge idle" id="statusBadge">Idle</div>
  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="show('standings',this)">Standings</div>
  <div class="tab" onclick="show('rosters',this)">Rosters</div>
  <div class="tab" onclick="show('gamelog',this)">Game Log</div>
</div>

<div id="page-standings" class="page active">
  <div class="last-updated" id="lastUpdated">Last updated: —</div>
  <div class="sec-title">Current Standings</div>
  <div class="standings-grid" id="standings-grid"></div>
</div>

<div id="page-rosters" class="page">
  <div class="sec-title">Rosters &amp; Points</div>
  <div id="rosters-container"></div>
</div>

<div id="page-gamelog" class="page">
  <div class="sec-title">Game Log</div>
  <div id="game-log-container"></div>
</div>

<script>
// ── ROSTER DATA ──────────────────────────────────────────────────────────────
const OWNER = {
  'Arizona':'Porter','Purdue':'Porter','Kentucky':'Porter',
  'Duke':'Chris','Kansas':'Chris','Vanderbilt':'Chris','UCF':'Chris',
  'Akron':'Chris','Northern Iowa':'Chris','CA Baptist':'Chris',
  'Hofstra':'Chris','Kennesaw St.':'Chris','Penn':'Chris',
  'Florida':'Mush',"St John's":'Mush','BYU':'Mush','Tennessee':'Mush',
  'TCU':'Mush','Utah State':'Mush','Miami (OH)':'Mush',
  'McNeese':'Mush','Troy':'Mush',
  'Michigan':'Jandy','Michigan St.':'Jandy','Virginia':'Jandy',
  'Arkansas':'Jandy','Louisville':'Jandy','North Carolina':'Jandy',
  'Santa Clara':'Jandy','Texas':'Jandy','VCU':'Jandy',
  'High Point':'Jandy',"Hawai'i":'Jandy',
  'Houston':'Slade','Iowa State':'Slade','Alabama':'Slade',
  'Nebraska':'Slade','Miami (FL)':'Slade','Iowa':'Slade',
  'UConn':'Corr','Gonzaga':'Corr','Illinois':'Corr',
  'Texas Tech':'Corr','Wisconsin':'Corr',"Saint Mary's":'Corr',
  'UCLA':'Corr','Clemson':'Corr','Georgia':'Corr',
  'Ohio St.':'Corr','Villanova':'Corr','Saint Louis':'Corr',
  'Missouri':'Corr','Texas A&M':'Corr','South Florida':'Corr',
  'N Dakota St.':'Corr','Wright St.':'Corr','Furman':'Corr',
  'Idaho':'Corr','Queens':'Corr','Tennessee St.':'Corr',
  'Lehigh/Prairie View':'Corr','Long Island':'Corr','Siena':'Corr',
};

const SEEDS = {
  'Duke':1,'Arizona':1,'Michigan':1,'Florida':1,
  'Iowa State':2,'Purdue':2,'UConn':2,'Houston':2,
  'Michigan St.':3,'Illinois':3,'Virginia':3,'Gonzaga':3,
  'Kansas':4,'Nebraska':4,'Arkansas':4,'Alabama':4,
  'Vanderbilt':5,'Texas Tech':5,"St John's":5,'Wisconsin':5,
  'North Carolina':6,'Louisville':6,'BYU':6,'Tennessee':6,
  'Miami (FL)':7,'UCLA':7,"Saint Mary's":7,'Kentucky':7,
  'Clemson':8,'Ohio St.':8,'Georgia':8,'Villanova':8,
  'Saint Louis':9,'TCU':9,'Iowa':9,'Utah State':9,
  'Santa Clara':10,'UCF':10,'Texas A&M':10,'Missouri':10,
  'South Florida':11,'Miami (OH)':11,'Texas':11,'VCU':11,
  'High Point':12,'Akron':12,'Northern Iowa':12,'McNeese':12,
  'CA Baptist':13,'Hofstra':13,"Hawai'i":13,'Troy':13,
  'Kennesaw St.':14,'N Dakota St.':14,'Penn':14,'Wright St.':14,
  'Furman':15,'Idaho':15,'Tennessee St.':15,'Queens':15,
  'Howard':16,'Long Island':16,'Siena':16,'Lehigh/Prairie View':16,
};

const ROUND_PTS = {64:1,32:2,16:3,8:4,4:5,2:10};

// ── BID COSTS ────────────────────────────────────────────────────────────────
const COSTS = {
  'Arizona':175,'Purdue':68,'Kentucky':7,
  'Duke':151,'Kansas':43,'Vanderbilt':22,'UCF':16,
  'Akron':4,'Northern Iowa':3,'CA Baptist':2,
  'Hofstra':4,'Kennesaw St.':3,'Penn':2,
  'Florida':100,"St John's":30,'BYU':53,'Tennessee':19,
  'TCU':15,'Utah State':11,'Miami (OH)':7,
  'McNeese':9,'Troy':6,
  'Michigan':100,'Michigan St.':30,'Virginia':25,
  'Arkansas':40,'Louisville':7,'North Carolina':20,
  'Santa Clara':10,'Texas':5,'VCU':7,
  'High Point':5,"Hawai'i":1,
  'Houston':134,'Iowa State':76,'Alabama':12,
  'Nebraska':15,'Miami (FL)':9,'Iowa':4,
  'UConn':72,'Gonzaga':41,'Illinois':35,
  'Texas Tech':19,'Wisconsin':25,"Saint Mary's":5,
  'UCLA':8,'Clemson':5,'Georgia':6,
  'Ohio St.':5,'Villanova':5,'Saint Louis':6,
  'Missouri':2,'Texas A&M':3,'South Florida':2,
  'N Dakota St.':1,'Wright St.':1,'Furman':1,
  'Idaho':1,'Queens':3,'Tennessee St.':1,
  'Lehigh/Prairie View':1,'Long Island':1,'Siena':1,
};

// ── KNOWN COMPLETED GAMES (baseline — all closed results) ────────────────────
// These are hardcoded and always shown. Live refresh adds/updates from API.
const BASELINE_GAMES = [
  // First Four
  {round:'FF',winner:'Prairie View A&M',loser:'Lehigh',ws:67,ls:55,wOwner:'Corr',lOwner:'Corr',ptsAwarded:0,note:'FF — Corr\'s team advances'},
  {round:'FF',winner:'Miami (OH)',loser:'SMU',ws:89,ls:79,wOwner:'Mush',lOwner:'Mush',ptsAwarded:0,note:'FF — Mush\'s team advances'},
  // R64 Thu
  {round:'R64',winner:'TCU',loser:'Ohio St.',ws:66,ls:64,wOwner:'Mush',lOwner:'Corr',ptsAwarded:3},
  {round:'R64',winner:'Nebraska',loser:'Troy',ws:76,ls:47,wOwner:'Slade',lOwner:'Mush',ptsAwarded:3},
  {round:'R64',winner:'Louisville',loser:'South Florida',ws:83,ls:79,wOwner:'Jandy',lOwner:'Corr',ptsAwarded:1},
  {round:'R64',winner:'High Point',loser:'Wisconsin',ws:83,ls:82,wOwner:'Jandy',lOwner:'Corr',ptsAwarded:3},
  {round:'R64',winner:'Duke',loser:'Siena',ws:71,ls:65,wOwner:'Chris',lOwner:null,ptsAwarded:1},
  {round:'R64',winner:'Vanderbilt',loser:'McNeese',ws:78,ls:68,wOwner:'Chris',lOwner:'Mush',ptsAwarded:2},
  {round:'R64',winner:'Arkansas',loser:"Hawai'i",ws:97,ls:78,wOwner:'Jandy',lOwner:'Jandy',ptsAwarded:2},
  {round:'R64',winner:'Michigan St.',loser:'N Dakota St.',ws:92,ls:67,wOwner:'Jandy',lOwner:'Corr',ptsAwarded:3},
  {round:'R64',winner:'VCU',loser:'North Carolina',ws:82,ls:78,wOwner:'Jandy',lOwner:'Jandy',ptsAwarded:3},
  {round:'R64',winner:'Michigan',loser:'Howard',ws:101,ls:80,wOwner:'Jandy',lOwner:null,ptsAwarded:3},
  {round:'R64',winner:'Texas A&M',loser:"Saint Mary's",ws:63,ls:50,wOwner:'Corr',lOwner:'Corr',ptsAwarded:4},
  {round:'R64',winner:'Illinois',loser:'Penn',ws:40,ls:30,wOwner:'Corr',lOwner:'Chris',ptsAwarded:2},
];

// ── LIVE GAMES (populated by API) ────────────────────────────────────────────
let liveGames = [];
let autoInterval = null;
let autoOn = false;

function marginPts(diff){ return diff>=30?3:diff>=20?2:diff>=10?1:0; }
function underdogPts(ws,ls){ return ws>ls?2:0; }
function sc(s){ return s<=3?`s${s}`:s<=5?'s4':s<=8?'s6':s<=11?'s9':'s12'; }

function calcPts(winner, loser, ws, ls) {
  const wseed = SEEDS[winner]||8, lseed = SEEDS[loser]||8;
  const rp = 1, mp = marginPts(ws-ls), up = underdogPts(wseed,lseed);
  return {rp, mp, up, total: rp+mp+up};
}

// ── BUILD ROSTERS TABLE ───────────────────────────────────────────────────────
function buildRosters(allGames) {
  const container = document.getElementById('rosters-container');
  container.innerHTML = '';

  // Compute pts per team from game log
  const teamPts = {};
  const teamStatus = {}; // 'alive' | 'eliminated'
  Object.keys(OWNER).forEach(t => { teamPts[t] = 0; teamStatus[t] = 'alive'; });

  allGames.forEach(g => {
    if(g.round === 'FF') return;
    if(!g.live) {
      // pts go to winner's team
      if(g.ptsAwarded > 0 && g.wOwner) {
        teamPts[g.winner] = (teamPts[g.winner]||0) + g.ptsAwarded;
      }
      teamStatus[g.loser] = 'eliminated';
    }
  });

  const players = ['Porter','Chris','Mush','Jandy','Slade','Corr'];
  const grid = document.createElement('div');
  grid.className = 'roster-grid';

  players.forEach(p => {
    const teams = Object.entries(OWNER)
      .filter(([,owner]) => owner === p)
      .map(([team]) => team)
      .sort((a,b) => (SEEDS[a]||99) - (SEEDS[b]||99));

    const totalPts = teams.reduce((s,t) => s + (teamPts[t]||0), 0);
    const totalCost = teams.reduce((s,t) => s + (COSTS[t]||0), 0);
    const aliveCount = teams.filter(t => teamStatus[t] === 'alive').length;

    const block = document.createElement('div');
    block.className = 'roster-block';
    block.innerHTML = `
      <div class="roster-header ${p}">
        <div class="roster-hname">${p}</div>
        <div class="roster-htotals">
          <div class="roster-hstat">
            <div class="lbl">Points</div>
            <div class="val gold">${totalPts}</div>
          </div>
          <div class="roster-hstat">
            <div class="lbl">Cost</div>
            <div class="val">$${totalCost}</div>
          </div>
          <div class="roster-hstat">
            <div class="lbl">Alive</div>
            <div class="val">${aliveCount}/${teams.length}</div>
          </div>
        </div>
      </div>
      <table class="roster-table">
        <thead>
          <tr>
            <th>Seed</th>
            <th>Team</th>
            <th class="right">Paid</th>
            <th class="right">Pts</th>
          </tr>
        </thead>
        <tbody>
          ${teams.map(t => {
            const pts = teamPts[t] || 0;
            const elim = teamStatus[t] === 'eliminated';
            const seed = SEEDS[t] || '?';
            return `<tr class="${elim?'eliminated':''}">
              <td><span class="${sc(seed)}" style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500">#${seed}</span></td>
              <td>
                <span class="status-dot ${elim?'elim':'alive'}"></span>
                <span class="team-name-cell">${t}</span>
              </td>
              <td class="cost-cell">$${COSTS[t]||'—'}</td>
              <td class="pts-cell ${pts>0?'has-pts':'no-pts'}">${pts>0?pts:'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td colspan="2" style="color:var(--muted);font-size:11px">Total</td>
            <td class="cost-cell" style="font-weight:700;color:var(--text)">$${totalCost}</td>
            <td class="pts-cell has-pts" style="font-size:16px">${totalPts}</td>
          </tr>
        </tfoot>
      </table>
    `;
    grid.appendChild(block);
  });

  container.appendChild(grid);
}
function computeScores(allGames) {
  const scores = {Porter:0,Chris:0,Mush:0,Jandy:0,Slade:0,Corr:0};
  const alive = {Porter:new Set(),Chris:new Set(),Mush:new Set(),Jandy:new Set(),Slade:new Set(),Corr:new Set()};
  const eliminated = new Set();

  // Start with all teams alive
  Object.entries(OWNER).forEach(([team,owner])=>{
    alive[owner].add(team);
  });

  allGames.forEach(g => {
    if(g.ptsAwarded > 0 && g.wOwner){
      scores[g.wOwner] += g.ptsAwarded;
    }
    // Mark losers eliminated
    if(g.round !== 'FF'){
      eliminated.add(g.loser);
      const lo = OWNER[g.loser];
      if(lo) alive[lo].delete(g.loser);
    }
  });

  return {scores, alive, eliminated};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(allGames) {
  const {scores, alive} = computeScores(allGames);
  const players = ['Porter','Chris','Mush','Jandy','Slade','Corr'];
  const ranked = [...players].sort((a,b)=>scores[b]-scores[a]);
  const maxScore = Math.max(...Object.values(scores), 1);

  // Standings
  const grid = document.getElementById('standings-grid');
  grid.innerHTML = '';
  ranked.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = `scard ${p}${i===0?' rank1':''}`;
    const aliveCount = alive[p].size;
    const totalTeams = Object.values(OWNER).filter(o=>o===p).length;
    const deadCount = totalTeams - aliveCount;
    d.innerHTML = `
      <div class="scard-top">
        <div>
          <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:2px">#${i+1}</div>
          <div class="scard-name">${p}${i===0?' <span class="rank-crown">👑</span>':''}</div>
        </div>
        <div class="scard-score">${scores[p]}</div>
      </div>
      <div class="scard-meta">
        <span>Teams: <span class="alive">${aliveCount} alive</span> / <span class="dead">${deadCount} out</span></span>
      </div>
      <div class="${p}"><div class="bar-track"><div class="bar-fill" style="width:${Math.round(scores[p]/maxScore*100)}%"></div></div></div>
    `;
    grid.appendChild(d);
  });

  // Game log
  const container = document.getElementById('game-log-container');
  container.innerHTML = '';

  // Group games
  const ff = allGames.filter(g=>g.round==='FF');
  const r64closed = allGames.filter(g=>g.round==='R64'&&!g.live);
  const r64live = allGames.filter(g=>g.live);
  const other = allGames.filter(g=>g.round!=='FF'&&g.round!=='R64');

  function renderGroup(label, games) {
    if(!games.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = label;
    container.appendChild(lbl);
    const div = document.createElement('div');
    div.className = 'game-log';
    games.forEach(g => {
      const c = document.createElement('div');
      c.className = `gcard${g.live?' live-game':''}`;
      const wseed = SEEDS[g.winner]||'?', lseed = SEEDS[g.loser]||'?';
      let ptsHtml = '';
      if(g.round==='FF'){
        ptsHtml = `<span class="chip r">Play-in · 0 pts</span>`;
      } else if(g.live){
        ptsHtml = `<span class="chip live-chip">🔴 LIVE ${g.ws}-${g.ls}</span>`;
      } else {
        const {rp,mp,up,total} = calcPts(g.winner,g.loser,g.ws,g.ls);
        ptsHtml += `<span class="chip r">+${rp} ${g.round}</span>`;
        if(mp) ptsHtml += `<span class="chip m">+${mp} margin</span>`;
        if(up) ptsHtml += `<span class="chip u">+${up} 🐶</span>`;
        ptsHtml += `<span class="chip tot">${total}→${g.wOwner||'—'}</span>`;
      }
      c.innerHTML = `
        <div class="grnd${g.live?' live':''}${g.round==='FF'?' ':''}">${g.live?'🔴':g.round}</div>
        <div class="gteams">
          <div class="gwinner">
            <span class="${sc(wseed)}" style="font-family:'DM Mono',monospace;font-size:10px">#${wseed}</span>
            ${g.winner}
            ${g.wOwner?`<span class="${g.wOwner} owner">${g.wOwner}</span>`:'<span class="none-own">—</span>'}
          </div>
          <div class="gloser">
            def. <span class="${sc(lseed)}" style="font-size:10px">#${lseed}</span>
            ${g.loser}
            ${g.lOwner?`<span class="${g.lOwner} owner">${g.lOwner}</span>`:'<span class="none-own">—</span>'}
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)">${g.live?'(live)':g.ws+'-'+g.ls}</span>
          </div>
        </div>
        <div class="gpts">${ptsHtml}</div>
      `;
      div.appendChild(c);
    });
    container.appendChild(div);
  }

  if(r64live.length) renderGroup('🔴 In Progress', r64live);
  renderGroup('Round of 64 — Completed', r64closed);
  renderGroup('First Four', ff);
  if(other.length) renderGroup('Other Rounds', other);

  // Rosters tab
  buildRosters(allGames);
}

// Maps sport radar abbreviations to our team names

  'OSU':'Ohio St.','TCU':'TCU','NEB':'Nebraska','TROY':'Troy',

  'ARK':'Arkansas','HAW':"Hawai'i",'MSU':'Michigan St.','NDSU':'N Dakota St.',
  'UNC':'North Carolina','VCU':'VCU','MICH':'Michigan','HOW':'Howard',
  'SMC':"Saint Mary's",'TXAM':'Texas A&M','ILL':'Illinois','PENN':'Penn',
  'UGA':'Georgia','SLU':'Saint Louis','GONZ':'Gonzaga','KENN':'Kennesaw St.',
  'HOU':'Houston','IDHO':'Idaho',

  'UK':'Kentucky','SCU':'Santa Clara','TTU':'Texas Tech','AKR':'Akron',

};

async function refreshScores() {
  const btn = document.getElementById('refreshBtn');
  const badge = document.getElementById('statusBadge');
  const icon = document.getElementById('refreshIcon');

  btn.disabled = true;
  icon.style.animation = 'spin 0.8s linear infinite';
  icon.style.display = 'inline-block';
  badge.className = 'status-badge loading';
  badge.innerHTML = '<span class="live-dot"></span>Fetching…';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a sports data assistant. Given NCAA basketball game data, return ONLY a JSON array of completed and in-progress games. Each object: {winner, loser, ws (winner score), ls (loser score), round (R64/R32/S16/E8/F4/CHAMP), live (bool)}. For in-progress games set live:true and use current scores. Only include games involving these teams: ${Object.values(ABBR_MAP).filter((v,i,a)=>a.indexOf(v)===i).join(', ')}. Return ONLY the JSON array, no other text.`,
        messages: [{
          role: 'user',
          content: `Here is current NCAA tournament game data. Parse it and return the JSON array of results for auction-relevant teams.\n\nGame data (abbreviation: score):\n${buildGameDataString()}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(c=>c.type==='text')?.text || '[]';
    const clean = text.replace(/```json|```/g,'').trim();
    const newGames = JSON.parse(clean);

    // Merge: keep baseline, add/update from API
    liveGames = newGames;
    const allGames = mergeGames(BASELINE_GAMES, liveGames);
    render(allGames);

    document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    badge.className = 'status-badge live';
    badge.innerHTML = '<span class="live-dot"></span>Live';
  } catch(e) {
    badge.className = 'status-badge idle';
    badge.textContent = 'Error';
    // Still render with baseline
    render(BASELINE_GAMES);
    console.error(e);
  } finally {
    btn.disabled = false;
    icon.style.animation = '';
  }
}

function buildGameDataString() {
  // This would ideally come from a live feed; we describe what we know
  return `Known completed R64 games (all closed): TCU def Ohio St 66-64, Nebraska def Troy 76-47, Louisville def South Florida 83-79, High Point def Wisconsin 83-82, Duke def Siena 71-65, Vanderbilt def McNeese 78-68, Arkansas def Hawaii 97-78, Michigan St def NDSU 92-67, VCU def North Carolina 82-78, Michigan def Howard 101-80, Texas A&M def Saint Mary's 63-50, Illinois def Penn 40-30. In progress: Houston vs Idaho (HOU 33 IDHO 15, 7:24 left), Saint Louis vs Georgia (SLU 37 UGA 18, 5:37 left), Gonzaga vs Kennesaw (GONZ 7 KENN 14, 10:46 left). Friday games not yet started.`;
}

function mergeGames(baseline, live) {
  // Remove baseline entries that appear in live (by winner/loser pair), add live ones
  const liveKeys = new Set(live.map(g=>`${g.winner}|${g.loser}`));
  const filtered = baseline.filter(g => !liveKeys.has(`${g.winner}|${g.loser}`));
  
  const liveFormatted = live.map(g => ({
    round: g.round || 'R64',
    winner: g.winner,
    loser: g.loser,
    ws: g.ws,
    ls: g.ls,
    live: g.live || false,
    wOwner: OWNER[g.winner] || null,
    lOwner: OWNER[g.loser] || null,
    ptsAwarded: g.live ? 0 : (()=>{
      const {total} = calcPts(g.winner, g.loser, g.ws, g.ls);
      return OWNER[g.winner] ? total : 0;
    })(),
  }));

  return [...filtered, ...liveFormatted];
}

function toggleAuto() {
  autoOn = !autoOn;
  const btn = document.getElementById('autoToggle');
  btn.classList.toggle('on', autoOn);
  if(autoOn) {
    autoInterval = setInterval(refreshScores, 60000); // every 60s
    refreshScores();
  } else {
    clearInterval(autoInterval);
    document.getElementById('statusBadge').className = 'status-badge idle';
    document.getElementById('statusBadge').textContent = 'Idle';
  }
}

function show(name,tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  tab.classList.add('active');
}

// CSS for spin animation
const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);

// Initial render with baseline data
render(BASELINE_GAMES);
document.getElementById('lastUpdated').textContent = `Baseline loaded: ${new Date().toLocaleTimeString()} — toggle Auto or click Refresh for live data`;
</script>
